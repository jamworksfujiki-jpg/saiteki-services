name: Deploy to LoliPop (saiteki-net.jp)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-lolipop:
    name: FTP upload to saiteki-net.jp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy (incremental sync)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.LOLIPOP_FTP_HOST }}
          username: ${{ secrets.LOLIPOP_FTP_USER }}
          password: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: ./
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vercel/**
            **/.github/**
            **/docs/**
            **/figma/**
            **/sales-list/**
            **/_tmp-review/**
            **/*.mjs
            **/*.cjs
            **/*.json
            **/*.md
            index-pre-figma-backup.html
            verify-*
            check-*.png
            shot-*
            composite-*
            preview-*.png
            apply-*
            inspect*
            fix-*
            crop.mjs
            gen-pdf.mjs
            design-report.*
            saiteki-*.png
